spring:
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # "update" cria as tabelas se não existirem — seguro para o primeiro deploy
      # Trocar para "validate" + Flyway quando o schema estabilizar
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public

app:
  auth:
    mode: prod

firebase:
  project-id: ${FIREBASE_PROJECT_ID:}
