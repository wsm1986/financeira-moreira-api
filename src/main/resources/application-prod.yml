spring:
  datasource:
    # DATABASE_URL deve ser a Internal Database URL do Render (sem prefixo jdbc:)
    # Formato: postgresql://user:password@host/db
    # O yaml adiciona jdbc: na frente para formar uma JDBC URL valida.
    # NUNCA commitar a URL com usuario/senha — configure como variavel de ambiente no Render.
    url: jdbc:${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  auth:
    mode: prod

firebase:
  project-id: ${FIREBASE_PROJECT_ID:}
