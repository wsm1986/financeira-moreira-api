spring:
  datasource:
    # TODO: substituir por PostgreSQL quando o banco estiver provisionado no Render
    # url: ${DATABASE_URL}
    # driver-class-name: org.postgresql.Driver
    url: jdbc:h2:mem:financeira;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

app:
  auth:
    mode: prod

firebase:
  project-id: ${FIREBASE_PROJECT_ID:}
