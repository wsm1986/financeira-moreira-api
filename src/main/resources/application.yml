server:
  port: ${PORT:8080}

spring:
  application:
    name: financeira-moreira-api
  threads:
    virtual:
      enabled: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    show-sql: false
    open-in-view: false
  jackson:
    serialization:
      write-bigdecimal-as-plain: true
    default-property-inclusion: non_null

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha
    tryItOutEnabled: true
    filter: true
  api-docs:
    path: /v3/api-docs
  show-actuator: false

callmebot:
  phone: ${CALLMEBOT_PHONE:}
  apikey: ${CALLMEBOT_APIKEY:}

notificacao:
  user-uid: ${NOTIFICACAO_USER_UID:}

# ── Bot WhatsApp (receber mensagens e criar lançamentos) ──────────────
# Configure no Render:
#   BOT_TOKEN    — UUID secreto gerado por você (uuidgenerator.net)
#   BOT_USER_UID — Firebase UID do usuário que será dono dos lançamentos
#   BOT_PHONE    — (opcional) número autorizado ex: 5511999999999
bot:
  token:    ${BOT_TOKEN:}
  user-uid: ${BOT_USER_UID:}
  phone:    ${BOT_PHONE:}
