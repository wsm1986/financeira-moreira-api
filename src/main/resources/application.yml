server:
  port: ${PORT:8080}

spring:
  application:
    name: financeira-moreira-api
  threads:
    virtual:
      enabled: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    show-sql: false
    open-in-view: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha
    tryItOutEnabled: true
    filter: true
  api-docs:
    path: /v3/api-docs
  show-actuator: false

callmebot:
  phone: ${CALLMEBOT_PHONE:}
  apikey: ${CALLMEBOT_APIKEY:}
